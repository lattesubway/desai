name: CI

on:
  push:
    branches: [main, 'claude/**', 'my-design']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Astro check
        run: npx astro check --minimumSeverity error
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
